<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Turing Test - Explorador</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .portal-container { text-align: center; background: white; padding: 40px; border-radius: 16px; shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; max-width: 600px; }
        h1 { color: #0f172a; margin-bottom: 10px; }
        p { color: #64748b; margin-bottom: 30px; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .portal-btn { 
            text-decoration: none; padding: 30px 20px; border-radius: 12px; border: 2px solid #e2e8f0;
            transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .portal-btn:hover { border-color: #6366f1; background-color: #f8fafc; transform: translateY(-2px); }
        .portal-btn b { color: #1e293b; font-size: 1.1em; }
        .portal-btn span { color: #94a3b8; font-size: 0.85em; text-align: center; }
        .icon { font-size: 2em; }
    </style>
</head>
<body>
    <div class="portal-container">
        <h1>Turing Test Incivility Project</h1>
        <p>Select the origin of the data you want to explore:</p>
        <div class="button-grid">
            <a href="reddit.html" class="portal-btn">
                <div class="icon">📁</div>
                <b>Reddit's archive</b>
                <span>Real Reddit threads</span>
            </a>
            <a href="plataforma.html" class="portal-btn">
                <div class="icon">🤖</div>
                <b>Chatroom platform</b>
                <span>Platform simulations</span>
            </a>
        </div>
    </div>
</body>
</html>
