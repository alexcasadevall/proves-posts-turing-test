<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Discussion Room - Plataforma IA</title>
    <link rel="stylesheet" href="../estils.css">
</head>
<body>
    <div id="session-wrapper">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="background: #f1f5f9; padding: 8px; border-radius: 8px; display: flex;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <div>
                    <div style="font-weight: 600; font-size: 14px; color: #1e293b;">Discussion Room</div>
                    <div id="p-count" style="font-size: 12px; color: #64748b;">0 participants</div>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 6px; font-size: 12px; color: #64748b;">
                <span style="height: 8px; width: 8px; background: #22c55e; border-radius: 50%;"></span> En línia
            </div>
        </div>

        <div id="messages-container">
            <div class="date-pill"><span>Avui</span></div>
            
            <div class="news-card">
                <div id="news-agency" style="font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; font-weight: 600;">Carregant...</div>
                <div id="news-title" class="news-title" style="font-weight: 700; font-size: 1.1em; margin-bottom: 8px;"></div>
                <div id="news-body" class="news-body" style="font-size: 0.95em; color: #334155;"></div>
                <div id="news-time" style="text-align: right; font-size: 11px; color: #94a3b8; margin-top: 10px;"></div>
            </div>

            <div id="reddit-messages"></div>
        </div>
    </div>

    <script>
        const COLORS = ['#6366f1', '#f59e0b', '#10b981', '#ef4444', '#0ea5e9', '#ec4899', '#8b5cf6'];
        
        async function start() {
            // 1. DETECCIÓ DE LA CARPETA
            // Busquem qualsevol segment de la URL que contingui "post_" (serveix per 'post_X' o 'plat_post_X')
            const pathSegments = window.location.pathname.split('/').filter(s => s.length > 0);
            const folderName = pathSegments.find(s => s.includes('post_')) || 'plat_post_1';
            
            // 2. EXTRACCIÓ DEL NÚMERO
            // Agafem el que hi ha després de l'últim guió baix (ex: de 'plat_post_2' treiem el '2')
            const postNum = folderName.split('_').pop();
            
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode'); 

            // 3. SELECCIÓ DEL FITXER JSON
            let fileName;
            if (mode === 'original') {
                fileName = `conversa_original_${postNum}.json`;
            } else if (mode === 'limit16') {
                fileName = `conversa_neta_limit16_${postNum}.json`;
            } else {
                // Per defecte: conversa_neta_plataforma2.json
                fileName = `conversa_neta_plataforma${postNum}.json`;
            }

            console.log("Detectat post:", postNum, "Cercant fitxer:", fileName);

            try {
                const res = await fetch(fileName);
                if (!res.ok) throw new Error(`No s'ha trobat el fitxer "${fileName}" dins de la carpeta "${folderName}"`);
                const data = await res.json();

                // Renderitzar dades de la notícia
                if (data.post_original) {
                    document.getElementById('news-agency').innerText = data.post_original.agency;
                    document.getElementById('news-title').innerText = data.post_original.title;
                    document.getElementById('news-body').innerText = data.post_original.body;
                    const postTime = new Date(data.post_original.timestamp * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    document.getElementById('news-time').innerText = postTime;
                }

                document.getElementById('p-count').innerText = `${data.num_participants} participants`;

                const list = document.getElementById('reddit-messages');
                const userColors = {};
                let cIdx = 0;

                // Renderitzar missatges
                data.messages.forEach(m => {
                    if(!userColors[m.sender]) { 
                        userColors[m.sender] = COLORS[cIdx % COLORS.length]; 
                        cIdx++; 
                    }
                    const col = userColors[m.sender];
                    const replyCol = m.reply_to ? (userColors[m.reply_to] || '#cbd5e1') : null;

                    const card = document.createElement('div');
                    card.className = 'message-card';
                    card.style.borderLeftColor = col;
                    
                    // Mostrar cita només si és una menció (@nom) detectada pel Python
                    let quoteHtml = '';
                    if (m.is_mention && m.reply_to) {
                        quoteHtml = `
                        <div class="quote" style="border-left-color: ${replyCol}">
                            <div class="quote-user" style="color: ${replyCol}">${m.reply_to}</div>
                            <div class="quote-text">${m.reply_text || "..."}</div>
                        </div>`;
                    }
                    
                    const t = new Date(m.timestamp * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    
                    card.innerHTML = `
                        <div class="msg-header">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div class="av" style="background:${col}">${m.sender[0]}</div>
                                <span class="un" style="color:${col}">${m.sender}</span>
                            </div>
                            <span class="ts">${t}</span>
                        </div>
                        ${quoteHtml}
                        <div class="msg-body">${m.text}</div>
                                                <div class="msg-footer">
                            <span class="btn"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg> Reply</span>
                            <span class="btn" style="${m.likes > 0 ? 'color:#ef4444' : ''}"><svg fill="${m.likes > 0 ? '#ef4444' : 'none'}" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg> ${m.likes > 0 ? m.likes : 'Like'}</span>
                            <span class="btn"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="4"></circle><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"></path></svg> Mention</span>
                            <span class="btn"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg> Report</span>
                        </div>`;
                    
                    list.appendChild(card);
                });
            } catch (err) {
                document.getElementById('reddit-messages').innerHTML = `
                <div style="padding:20px; background:#fee2e2; border:1px solid #ef4444; border-radius:8px; color:#b91c1c;">
                    <strong>Error de configuració:</strong> ${err.message}<br><br>
                    <small>Revisa que el fitxer JSON estigui dins de la carpeta i es digui exactament així.</small>
                </div>`;
            }
        }
        start();
    </script>
</body>
</html>
